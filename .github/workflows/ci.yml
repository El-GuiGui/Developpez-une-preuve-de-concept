name: CI — Dashboard Tests

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          # Erreurs de syntaxe et noms non définis (bloquant)
          flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings (non-bloquant)
          flake8 scripts/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Run unit tests
        env:
          PROJ8_ROOT: ${{ github.workspace }}
        run: |
          mkdir -p data/raw/cityscapes scripts out/experiments models logs
          touch scripts/__init__.py
          python -m pytest tests/test_dashboard_unit.py -v --tb=short -x

      - name: Check dashboard syntax
        run: |
          python -c "import py_compile; py_compile.compile('app/streamlit_app.py', doraise=True)"
          echo "Dashboard syntax OK"
